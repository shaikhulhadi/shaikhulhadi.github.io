###########################################################
#                Research Project
###########################################################
research_project:
  main:
    header: "Research Project"
    info: "Primary dissertation research — Computer Architecture"

  list:
    - type: id_dpd
      project_name: "Distributed Persistent Domain"
      project_excerpt: "Manuscript submitted"
      post: |
        Memory disaggregation introduces high persist-operation latency that breaks persistent memory programming models.
        We propose a novel persistent domain abstraction for disaggregated memory systems to address crash consistency at scale.

    - type: id_dai_project
      project_name: "Durable Atomic Instructions"
      project_excerpt: "Published in DAC 2023, nominated for NVMW 2024"
      paper_url: "https://ieeexplore.ieee.org/abstract/document/10247729"
      post: |
        Existing hardware lacks durable atomic instruction support, violating crash consistency in persistent parallel programs.
        We extend the cache coherence protocol with minimal hardware changes, achieving crash consistency and a 6.4% average speedup on SPLASH-4.



###########################################################
#                Engineering Project
###########################################################
engineering_project:
  main:
    header: "Engineering Project"

  list:
    - type: id_led
      project_name: "BUET LED Driver Controller Digital IC"
      project_excerpt: "First iteration fabricated June 2018"
      img: ":led_driver.webp"
      img_title: "BUET LED Driver Controller Digital IC"
      post: |
        Designed a digital controller IC to replace analog boost controllers in LED driver circuits for Solar Home Systems,
        under BUET-Energypac Research Collaboration HEQEP Sub-Project CP#3817.
        Implemented in TSMC 180nm technology; first fabrication completed with IO pad mismatch identified for next revision.

    - type: id_standard_cell
      project_name: "BUET VLSI Standard Cell Library"
      project_excerpt: "53-cell library based on TSMC 180nm 7-track technology"
      img: ":standard_cell.webp"
      img_title: "2 input NAND gate"
      post: |
        Designed and characterized a 53-cell standard cell library (50 digital + 3 analog) based on TSMC 180nm 7-track technology.
        All cells characterized using Cadence Liberate and Abstract Generator; library was used in the BUET LED driver controller design.

