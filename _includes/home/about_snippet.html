<div class="row about-main" style="margin-top:0; margin-bottom:{{ include.gap }}; padding:var(--text-spacing); display:flex; align-items:center;">
    <div class="about-img" style="flex: 0 0 auto; padding-right: 4px;">
      <img src="{{ site.baseurl }}{{ site.data.conf.main.side_nav_profile_img_path }}" alt="" style="border-radius:16px; display:block;">
    </div>
    <div class="col-md-6 about-header" style="position:static; top:auto; transform:none; margin-left:0; padding-left:4px; text-align:left;">
      <h1 translate="no" style="width:auto; margin:0;">{{ site.data.owner[lng].brand }}</h1>
      <div class="about-position-block" style="margin-top:8px;">
        {% include about/position.html %}
      </div>
    </div>
    <div class="col-md-3" style="display:flex; align-items:center; justify-content:flex-end;">
      {% include about/resume_download.html %}
    </div>
</div>
